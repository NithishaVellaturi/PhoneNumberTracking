spring.application.name=tracksecure-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/tracksecure;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173,http://127.0.0.1:5173}
app.security.jwt-secret=${JWT_SECRET:tracksecure-local-development-secret-with-at-least-64-characters-2026}
app.security.access-token-minutes=${ACCESS_TOKEN_MINUTES:15}
app.security.refresh-token-days=${REFRESH_TOKEN_DAYS:7}
app.security.cookie-secure=${COOKIE_SECURE:false}
app.caller-name.provider=${CALLER_NAME_PROVIDER:none}
app.caller-name.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.caller-name.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.caller-name.twilio.timeout-ms=${TWILIO_LOOKUP_TIMEOUT_MS:3000}
